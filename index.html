<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Co vařit?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Foodie</h1>
      <p class="muted">Mocný nástroj pro věčné dilema: „Co budeme jíst?“</p>
    </header>

    <section class="card">
      <h2>Chceš podle něčeho filtrovat?</h2>

      <div class="grid filters-grid">
        <div>
          <label class="group-label">Bude to oběd nebo večeře?</label>
          <div id="ms-mealType" class="multi-select"></div>
        </div>

        <div>
          <label class="group-label">Kolik máš času na přípravu?</label>
          <div id="ms-timeCategory" class="multi-select"></div>
        </div>

        <div>
          <label class="group-label">Tagy</label>
          <div id="ms-tags" class="multi-select"></div>
        </div>

        <div>
          <label class="group-label">Potřebné nástroje k přípravě</label>
          <div id="ms-methods" class="multi-select"></div>
        </div>

        <div>
          <label class="group-label">Suroviny</label>
          <div id="ms-ingredients" class="multi-select"></div>
        </div>
      </div>

      <div class="row">
        <button id="btnPick" class="primary">Vylosuj jídlo</button>
        <button id="btnReset" class="danger">Reset filtrů</button>
      </div>
    </section>

    <section class="card">
      <h2>Výsledek</h2>
      
      <div id="resultContainer" class="result-container muted">
         <div id="result" class="result">Klikni na „Vylosuj jídlo“.</div>
         
         <div id="resultImageContainer" class="result-image-container" style="display: none;">
             <img id="resultImage" src="" alt="Obrázek jídla" class="food-image" />
         </div>
      </div>

      <div class="row" style="margin-top: 1rem;">
        <button id="btnFav" disabled>⭐ Oblíbené</button>
        <button id="btnCooked" disabled>✅ Uvařeno dnes</button>
        <button id="btnSkip" disabled>🙅 Nechci 7 dní</button>
      </div>
    </section>

    <section class="card">
      <h2>Moje data</h2>
      <p class="muted">Oblíbené, historie a skrytá jídla se ukládají lokálně.</p>

      <div class="row">
        <button id="btnExport">Export JSON</button>
        <label class="file">
          Import JSON
          <input id="importFile" type="file" accept="application/json" />
        </label>
        <button id="btnClearLocal" class="danger">Smazat lokální data</button>
      </div>

      <details>
        <summary>Debug stav</summary>
        <pre id="debug"></pre>
      </details>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
