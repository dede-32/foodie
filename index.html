<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Co vařit?</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Co vařit?</h1>
      <p class="muted">Chytrý losovač jídel z databáze.</p>
    </header>

    <section class="card">
      <h2>Filtry</h2>

      <div class="grid">
        <label>
          Typ jídla
          <select id="mealType">
            <option value="">(libovolně)</option>
          </select>
        </label>

        <label>
          Čas
          <select id="timeCategory">
            <option value="">(libovolně)</option>
            <option value="0-30">0–30 min</option>
            <option value="30-60">30–60 min</option>
            <option value="60+">60+ min</option>
          </select>
        </label>

        <label>
          Tag
          <select id="tag">
            <option value="">(libovolně)</option>
          </select>
        </label>

        <label>
          Způsob přípravy
          <select id="method">
            <option value="">(libovolně)</option>
          </select>
        </label>

        <label>
          Hlavní surovina
          <select id="ingredient">
            <option value="">(libovolně)</option>
          </select>
        </label>
      </div>

      <div class="row">
        <button id="btnPick" class="primary">Vylosuj jídlo</button>
        <button id="btnAgain">Znovu</button>
        <button id="btnReset" class="danger">Reset filtrů</button>
      </div>
    </section>

    <section class="card">
      <h2>Výsledek</h2>
      <div id="result" class="result muted">Klikni na „Vylosuj jídlo“.</div>

      <div class="row">
        <button id="btnFav" disabled>⭐ Oblíbené</button>
        <button id="btnCooked" disabled>✅ Uvařeno dnes</button>
        <button id="btnSkip" disabled>🙅 Nechci 7 dní</button>
      </div>
    </section>

    <section class="card">
      <h2>Moje data</h2>
      <p class="muted">
        Oblíbené, historie a skrytá jídla se ukládají lokálně do prohlížeče.
      </p>

      <div class="row">
        <button id="btnExport">Export JSON</button>
        <label class="file">
          Import JSON
          <input id="importFile" type="file" accept="application/json" />
        </label>
        <button id="btnClearLocal" class="danger">Smazat lokální data</button>
      </div>

      <details>
        <summary>Debug stav</summary>
        <pre id="debug"></pre>
      </details>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
